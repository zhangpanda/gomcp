# Archive GitHub Traffic statistics weekly.
#
# GitHub's built-in Traffic API only keeps the last 14 days of data. This
# workflow snapshots the 4 Traffic endpoints every Monday and commits the
# raw JSON into docs/traffic/data/ so that historical trends are preserved.
#
# Setup: the Traffic API is NOT accessible via the built-in GITHUB_TOKEN
# (it rejects all GitHub App tokens with HTTP 403). You must create a
# Personal Access Token and store it as a repository secret named
# TRAFFIC_TOKEN. See docs/traffic/README.md for step-by-step instructions.

name: Traffic archive

on:
  schedule:
    # Every Monday at 02:00 UTC (10:00 Beijing).
    - cron: '0 2 * * MON'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  archive:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Verify TRAFFIC_TOKEN is configured
        env:
          TRAFFIC_TOKEN: ${{ secrets.TRAFFIC_TOKEN }}
        run: |
          if [ -z "$TRAFFIC_TOKEN" ]; then
            cat >&2 <<'EOF'
          ::error::TRAFFIC_TOKEN secret is not configured.

          The Traffic API cannot be called with GITHUB_TOKEN (GitHub
          rejects all GitHub App tokens with HTTP 403 on this endpoint).
          You must create a Personal Access Token with admin/push access
          and store it as a repository secret named TRAFFIC_TOKEN.

          See docs/traffic/README.md for step-by-step setup.
          EOF
            exit 1
          fi

      - name: Fetch traffic data
        env:
          GH_TOKEN: ${{ secrets.TRAFFIC_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          DATE=$(date -u +%Y-%m-%d)
          OUT_DIR="docs/traffic/data"
          mkdir -p "$OUT_DIR"

          for endpoint in views clones; do
            echo "Fetching $endpoint ..."
            gh api "repos/${REPO}/traffic/${endpoint}" \
              > "${OUT_DIR}/${DATE}-${endpoint}.json"
          done

          for endpoint in popular/referrers popular/paths; do
            name=$(echo "$endpoint" | tr '/' '-')
            echo "Fetching $endpoint ..."
            gh api "repos/${REPO}/traffic/${endpoint}" \
              > "${OUT_DIR}/${DATE}-${name}.json"
          done

          echo "Archived files:"
          ls -la "${OUT_DIR}/${DATE}"*

      - name: Commit & push
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/traffic/
          if git diff --cached --quiet; then
            echo "No traffic changes to commit"
            exit 0
          fi
          DATE=$(date -u +%Y-%m-%d)
          git commit -m "chore(traffic): weekly archive ${DATE}"
          git push
