name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          release-type: go
          token: ${{ secrets.GITHUB_TOKEN }}
        # If the repo hasn't enabled "Allow GitHub Actions to create
        # pull requests" under Settings → Actions → General, this step
        # will fail. That's a one-time setup — not a code issue.
        continue-on-error: true
