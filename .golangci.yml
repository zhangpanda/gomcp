version: "2"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - bodyclose
    - nilerr
    - nilnil
    - reassign
    - copyloopvar
    - durationcheck
    - makezero
    - noctx
    - forcetypeassert
    - musttag
  settings:
    errcheck:
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
        - (io.Closer).Close
        - (*encoding/json.Encoder).Encode
  exclusions:
    paths:
      - docs
      - examples
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - noctx
          - bodyclose
          - forcetypeassert
          - musttag
          - nilnil
      - linters:
          - staticcheck
        text: "SA1019.*deprecated"
      - linters:
          - staticcheck
        text: "S1009|S1025|QF1001"

formatters:
  enable:
    - gofmt
