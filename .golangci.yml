version: "2"

linters:
  enable:
    - errcheck        # unchecked errors
    - govet           # suspicious constructs
    - staticcheck     # advanced static analysis
    - unused          # unused code
    - ineffassign     # useless assignments
    - bodyclose       # unclosed HTTP response bodies
    - nilerr          # returning nil error after checking err != nil
    - nilnil          # returning nil,nil from functions
    - reassign        # reassigning top-level variables
    - copyloopvar     # loop variable capture bugs
    - durationcheck   # duration multiplication mistakes
    - makezero        # append to non-zero-length slice
    - noctx           # http requests without context
    - forcetypeassert # bare type assertions without ok check
    - musttag         # struct tags enforcement
  settings:
    errcheck:
      exclude-functions:
        - (fmt.Fprint)
        - (fmt.Fprintf)
        - (fmt.Fprintln)
        - (*encoding/json.Encoder).Encode
        - (io.Writer).Write
        - (net/http.ResponseWriter).Write
  exclusions:
    paths:
      - docs
      - examples
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - noctx
          - bodyclose
          - forcetypeassert

formatters:
  enable:
    - gofmt
